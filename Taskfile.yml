version: "3"

tasks:
  default:
    desc: "タスク一覧を表示"
    cmds:
      - task --list

  dev:
    desc: "フロントエンドとバックエンドを同時に起動"
    deps: [dev:frontend, dev:backend]

  dev:frontend:
    desc: "Vite 開発サーバーを起動"
    dir: frontend
    cmds:
      - npm run dev

  dev:backend:
    desc: "FastAPI サーバーを起動 (port 8000)"
    dir: backend
    cmds:
      - uvicorn main:app --reload

  install:
    desc: "フロントエンドの依存パッケージをインストール"
    dir: frontend
    cmds:
      - npm install

  build:
    desc: "フロントエンドをビルド"
    dir: frontend
    cmds:
      - npm run build

  preview:
    desc: "ビルド済みフロントエンドをプレビュー"
    dir: frontend
    cmds:
      - npm run preview

  setup:
    desc: "初回セットアップ (npm install + DB コピー)"
    cmds:
      - task: install

  up:
    desc: "Docker Compose でサービスを起動"
    cmds:
      - docker compose up -d

  down:
    desc: "Docker Compose でサービスを停止"
    cmds:
      - docker compose down

  build:docker:
    desc: "Docker イメージをビルド"
    cmds:
      - docker compose build

  logs:
    desc: "全サービスのログを表示 (Ctrl+C で終了)"
    cmds:
      - docker compose logs -f

  ps:
    desc: "サービスの稼働状況を確認"
    cmds:
      - docker compose ps
