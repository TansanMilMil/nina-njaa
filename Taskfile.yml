version: "3"

dotenv: [".env"]

tasks:
  default:
    desc: "タスク一覧を表示"
    cmds:
      - task --list

  dev:
    desc: "フロントエンドとバックエンドを同時に起動"
    deps: [dev:frontend, dev:backend]

  dev:frontend:
    desc: "Vite 開発サーバーを起動"
    dir: frontend
    cmds:
      - npm run dev

  dev:backend:
    desc: "FastAPI サーバーを起動 (port 8001)"
    dir: backend
    env:
      UPLOADS_DIR: "{{.ROOT_DIR}}/backend/uploads"
    cmds:
      - .venv/bin/uvicorn main:app --reload --port 8001

  install:
    desc: "フロントエンド・バックエンドの依存パッケージをインストール"
    deps: [install:frontend, install:backend]

  install:frontend:
    desc: "フロントエンドの依存パッケージをインストール"
    dir: frontend
    cmds:
      - npm install

  install:backend:
    desc: "バックエンドの依存パッケージをインストール"
    dir: backend
    cmds:
      - .venv/bin/pip install -r requirements.txt

  build:
    desc: "フロントエンドをビルド"
    dir: frontend
    cmds:
      - npm run build

  preview:
    desc: "ビルド済みフロントエンドをプレビュー"
    dir: frontend
    cmds:
      - npm run preview

  setup:
    desc: "初回セットアップ (npm install + DB コピー)"
    cmds:
      - task: install

  up:
    desc: "Docker Compose でサービスを起動"
    cmds:
      - docker compose up -d

  down:
    desc: "Docker Compose でサービスを停止"
    cmds:
      - docker compose down

  build:docker:
    desc: "Docker イメージをビルド"
    cmds:
      - docker compose build

  logs:
    desc: "全サービスのログを表示 (Ctrl+C で終了)"
    cmds:
      - docker compose logs -f

  ps:
    desc: "サービスの稼働状況を確認"
    cmds:
      - docker compose ps

  deploy:
    desc: "venusにrsyncでデプロイし docker compose を再起動"
    cmds:
      - bash scripts/deploy.sh

  db:backup:
    desc: "recipes.db を日時付きでバックアップ (./backups/ に保存)"
    cmds:
      - |
        mkdir -p backups
        dest="backups/recipes_$(date +%Y%m%d_%H%M%S).db"
        cp backend/db/recipes.db "$dest"
        echo "バックアップ完了: $dest"
